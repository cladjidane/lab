<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>PAI — Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Space Grotesk', -apple-system, sans-serif; }
  canvas { display: block; }

  #search-box {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center;
    background: #fff; border: 1px solid #e4e2de; border-radius: 10px;
    padding: 0 16px; width: 380px; height: 44px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  #search-box:focus-within { border-color: #0ea5e9; box-shadow: 0 2px 20px rgba(14,165,233,0.1); }
  #search-input { border: none; outline: none; background: none; font-family: 'Space Grotesk'; font-size: 14px; color: #1b1c1a; width: 100%; }
  #search-input::placeholder { color: #c8c6c2; }
  #search-results-count { font-size: 11px; color: #a8a6a1; white-space: nowrap; font-family: 'Manrope'; margin-left: 8px; }
  #search-clear { background: none; border: none; cursor: pointer; color: #c8c6c2; font-size: 16px; padding: 4px; display: none; }
  #search-clear:hover { color: #1b1c1a; }

  #legend { position: fixed; top: 24px; left: 24px; display: flex; gap: 16px; z-index: 5; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #a8a6a1; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #stats { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); color: #a8a6a1; font-size: 11px; letter-spacing: 1.5px; font-family: 'Space Grotesk', monospace; text-transform: uppercase; z-index: 5; }
  #stats span { color: #1b1c1a; font-weight: 600; }

  #panel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: #fbf9f5; border-left: 1px solid #e4e2de; padding: 48px 32px 32px; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10; overflow-y: auto; }
  #panel.open { right: 0; }
  #panel-close { position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; font-size: 20px; color: #a8a6a1; line-height: 1; padding: 4px 8px; }
  #panel-close:hover { color: #1b1c1a; }
  #panel-category { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }
  #panel-name { font-size: 28px; font-weight: 700; color: #1b1c1a; margin-bottom: 20px; line-height: 1.2; }
  .panel-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .stat-box { background: #f3f1ed; border-radius: 8px; padding: 12px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #1b1c1a; }
  .stat-label { font-size: 10px; color: #a8a6a1; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; font-family: 'Manrope'; }
  #panel-connections-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #a8a6a1; font-weight: 500; margin-bottom: 10px; }
  .conn-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f3f1ed; cursor: pointer; }
  .conn-item:hover { background: #f3f1ed; margin: 0 -8px; padding: 8px; border-radius: 6px; border-bottom-color: transparent; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .conn-name { font-size: 13px; font-weight: 500; color: #1b1c1a; }
  .conn-sessions { font-size: 11px; color: #a8a6a1; margin-left: auto; font-family: 'Manrope'; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Poser une question a la memoire..." spellcheck="false" autocomplete="off" autofocus>
  <span id="search-results-count"></span>
  <button id="search-clear">&times;</button>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#0ea5e9"></div>Infra IA</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Geo</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Clients</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Outils</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Voix</div>
  <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Meta</div>
</div>

<canvas id="c"></canvas>

<div id="panel">
  <button id="panel-close">&times;</button>
  <div id="panel-category"></div>
  <div id="panel-name"></div>
  <div class="panel-stats">
    <div class="stat-box"><div class="stat-val" id="panel-facts">—</div><div class="stat-label">Faits</div></div>
    <div class="stat-box"><div class="stat-val" id="panel-sessions">—</div><div class="stat-label">Sessions</div></div>
    <div class="stat-box"><div class="stat-val" id="panel-conns">—</div><div class="stat-label">Liens</div></div>
  </div>
  <div id="panel-connections-title">Projets connectes</div>
  <div id="panel-connections"></div>
</div>

<div id="stats"><span>12 655</span> faits &middot; <span>2 281</span> sessions &middot; <span>53</span> projets</div>

<script>
// DATA
const projects = [
  { id: "pai", facts: 2329, sessions: 409, category: "infra" },
  { id: "map-creator", facts: 1166, sessions: 112, category: "geo" },
  { id: "personal", facts: 899, sessions: 270, category: "meta" },
  { id: "koality-pm", facts: 732, sessions: 145, category: "tools" },
  { id: "voice-notes", facts: 708, sessions: 103, category: "voice" },
  { id: "client-alpha", facts: 627, sessions: 101, category: "client" },
  { id: "client-bravo", facts: 595, sessions: 73, category: "client" },
  { id: "client-charlie", facts: 538, sessions: 89, category: "client" },
  { id: "client-delta", facts: 490, sessions: 49, category: "client" },
  { id: "conferences", facts: 462, sessions: 57, category: "meta" },
  { id: "client-echo", facts: 413, sessions: 44, category: "client" },
  { id: "jeofun", facts: 435, sessions: 65, category: "geo" },
  { id: "gittte", facts: 260, sessions: 27, category: "geo" },
  { id: "client-foxtrot", facts: 254, sessions: 28, category: "client" },
  { id: "prya", facts: 240, sessions: 50, category: "tools" },
  { id: "dictaphone", facts: 229, sessions: 20, category: "voice" },
  { id: "client-golf", facts: 181, sessions: 16, category: "client" },
  { id: "fabou", facts: 163, sessions: 14, category: "meta" },
  { id: "uptake", facts: 152, sessions: 11, category: "meta" },
  { id: "investissement", facts: 113, sessions: 21, category: "geo" },
  { id: "claude-analysis", facts: 97, sessions: 9, category: "infra" },
  { id: "geofen", facts: 94, sessions: 19, category: "geo" },
  { id: "cours-isen", facts: 94, sessions: 13, category: "meta" },
  { id: "game", facts: 91, sessions: 8, category: "geo" },
  { id: "traffic-viewer", facts: 90, sessions: 14, category: "infra" },
  { id: "deepread", facts: 82, sessions: 4, category: "tools" },
  { id: "abers", facts: 72, sessions: 5, category: "geo" },
  { id: "cartofab", facts: 55, sessions: 11, category: "geo" },
  { id: "client-hotel", facts: 98, sessions: 12, category: "client" },
  { id: "client-india", facts: 53, sessions: 9, category: "client" },
  { id: "battle-ia", facts: 26, sessions: 3, category: "meta" },
  { id: "epicycle", facts: 25, sessions: 4, category: "tools" },
];
const links = [
  { source: "pai", target: "personal", weight: 22 },
  { source: "client-alpha", target: "personal", weight: 17 },
  { source: "conferences", target: "pai", weight: 12 },
  { source: "map-creator", target: "pai", weight: 12 },
  { source: "personal", target: "client-bravo", weight: 12 },
  { source: "conferences", target: "personal", weight: 11 },
  { source: "client-alpha", target: "client-echo", weight: 9 },
  { source: "client-alpha", target: "pai", weight: 9 },
  { source: "koality-pm", target: "pai", weight: 9 },
  { source: "pai", target: "client-bravo", weight: 9 },
  { source: "personal", target: "prya", weight: 9 },
  { source: "client-echo", target: "personal", weight: 6 },
  { source: "cartofab", target: "map-creator", weight: 6 },
  { source: "map-creator", target: "personal", weight: 6 },
  { source: "client-alpha", target: "client-charlie", weight: 5 },
  { source: "client-echo", target: "client-bravo", weight: 5 },
  { source: "traffic-viewer", target: "pai", weight: 5 },
  { source: "conferences", target: "client-bravo", weight: 5 },
  { source: "geofen", target: "personal", weight: 5 },
  { source: "investissement", target: "personal", weight: 5 },
  { source: "koality-pm", target: "map-creator", weight: 5 },
  { source: "client-india", target: "pai", weight: 5 },
  { source: "map-creator", target: "client-bravo", weight: 5 },
  { source: "koality-pm", target: "client-delta", weight: 4 },
  { source: "koality-pm", target: "client-bravo", weight: 4 },
  { source: "map-creator", target: "prya", weight: 4 },
  { source: "map-creator", target: "client-delta", weight: 4 },
  { source: "pai", target: "client-delta", weight: 4 },
  { source: "client-delta", target: "client-bravo", weight: 4 },
  { source: "cartofab", target: "pai", weight: 4 },
  { source: "jeofun", target: "map-creator", weight: 4 },
  { source: "jeofun", target: "pai", weight: 4 },
  { source: "jeofun", target: "prya", weight: 4 },
  { source: "dictaphone", target: "personal", weight: 3 },
  { source: "gittte", target: "map-creator", weight: 3 },
  { source: "jeofun", target: "koality-pm", weight: 3 },
  { source: "jeofun", target: "personal", weight: 3 },
  { source: "jeofun", target: "client-delta", weight: 3 },
  { source: "jeofun", target: "client-bravo", weight: 3 },
  { source: "client-golf", target: "personal", weight: 3 },
  { source: "client-echo", target: "map-creator", weight: 3 },
  { source: "client-echo", target: "pai", weight: 3 },
  { source: "client-echo", target: "client-delta", weight: 3 },
  { source: "koality-pm", target: "personal", weight: 3 },
  { source: "koality-pm", target: "prya", weight: 3 },
];
const categoryLabels = { infra: "Infra IA", geo: "Geographique", client: "Client", tools: "Outils", voice: "Voix / Audio", meta: "Meta" };
const palette = { infra: "#0ea5e9", geo: "#f59e0b", client: "#f87171", tools: "#34d399", voice: "#a78bfa", meta: "#94a3b8" };
function hexRgb(hex) { const v = parseInt(hex.slice(1), 16); return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 }; }

// CANVAS
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const dpr = window.devicePixelRatio || 1;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); scheduleRedraw(); });

// NODES
const maxFacts = Math.max(...projects.map(p => p.facts));
const nodes = projects.map(p => {
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 180;
  return { ...p, x: W/2 + Math.cos(angle)*dist, y: H/2 + Math.sin(angle)*dist, vx: 0, vy: 0,
    radius: 8 + Math.sqrt(p.facts / maxFacts) * 52, hex: palette[p.category], rgb: hexRgb(palette[p.category]) };
});
const nodeMap = {}; nodes.forEach(n => nodeMap[n.id] = n);
const edges = links.map(l => ({ source: nodeMap[l.source], target: nodeMap[l.target], weight: l.weight })).filter(e => e.source && e.target);

// FLOW PARTICLES
const flowParticles = [];
function spawnFlow(node) {
  flowParticles.length = 0;
  edges.filter(e => {
    if (e.source !== node && e.target !== node) return false;
    // In search mode, only spawn toward other hit nodes
    if (searchActive) {
      const other = e.source === node ? e.target : e.source;
      return !!searchHits[other.id];
    }
    return true;
  }).forEach(e => {
    for (let i = 0; i < Math.ceil(e.weight / 3); i++)
      flowParticles.push({ edge: e, t: Math.random(), speed: 0.003 + Math.random()*0.004, dir: e.source === node ? 1 : -1, size: 2+Math.random()*2, rgb: node.rgb });
  });
}

// DOT GRID
function drawGrid() {
  ctx.fillStyle = '#e8e6e2';
  for (let x = 28; x < W; x += 28) for (let y = 28; y < H; y += 28) { ctx.beginPath(); ctx.arc(x, y, 0.6, 0, Math.PI*2); ctx.fill(); }
}

// PHYSICS
let simSteps = 0, settled = false;
function simulate() {
  const cx = W/2, cy = H/2;
  nodes.forEach(n => { n.vx += (cx-n.x)*0.0008; n.vy += (cy-n.y)*0.0008; });
  for (let i = 0; i < nodes.length; i++) for (let j = i+1; j < nodes.length; j++) {
    const a = nodes[i], b = nodes[j]; let dx = b.x-a.x, dy = b.y-a.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
    const f = -1200/(dist*dist), fx = dx/dist*f, fy = dy/dist*f;
    a.vx -= fx; a.vy -= fy; b.vx += fx; b.vy += fy;
    const m = a.radius+b.radius+32;
    if (dist < m) { const p = (m-dist)*0.4; a.x -= dx/dist*p; a.y -= dy/dist*p; b.x += dx/dist*p; b.y += dy/dist*p; }
  }
  edges.forEach(e => {
    const dx = e.target.x-e.source.x, dy = e.target.y-e.source.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
    const f = (dist - 100 - e.source.radius - e.target.radius) * 0.002 * Math.sqrt(e.weight);
    e.source.vx += dx/dist*f; e.source.vy += dy/dist*f; e.target.vx -= dx/dist*f; e.target.vy -= dy/dist*f;
  });
  const d = Math.max(0.25, 0.85 - simSteps*0.002);
  nodes.forEach(n => { n.vx *= d; n.vy *= d; n.x += n.vx; n.y += n.vy;
    n.x = Math.max(n.radius+40, Math.min(W-n.radius-40, n.x)); n.y = Math.max(n.radius+40, Math.min(H-n.radius-60, n.y)); });
  if (nodes.reduce((s,n) => s + Math.abs(n.vx) + Math.abs(n.vy), 0) < 0.5) settled = true;
}

// STATE
let hovered = null, selected = null, searchHits = {}, searchActive = false, frame = 0, needsRedraw = true, rafPending = false;
let viewOffsetX = 0, viewOffsetTarget = 0; // shift when panel opens
function scheduleRedraw() { needsRedraw = true; if (!rafPending) { rafPending = true; requestAnimationFrame(draw); } }

// MOUSE — on canvas only
canvas.addEventListener('mousemove', e => {
  hovered = null;
  const mx = e.clientX - viewOffsetX, my = e.clientY;
  for (const n of nodes) { const dx = mx-n.x, dy = my-n.y; if (dx*dx+dy*dy < (n.radius+8)**2) { hovered = n; break; } }
  canvas.style.cursor = hovered ? 'pointer' : 'default';
  scheduleRedraw();
});
canvas.addEventListener('click', e => {
  let clicked = null;
  const mx = e.clientX - viewOffsetX, my = e.clientY;
  for (const n of nodes) { const dx = mx-n.x, dy = my-n.y; if (dx*dx+dy*dy < (n.radius+8)**2) { clicked = n; break; } }
  if (clicked) { selectNode(clicked); } else if (selected) { closePanel(); }
});

// PANEL
const panel = document.getElementById('panel');
function selectNode(node) {
  selected = node; spawnFlow(node); openPanel(node); scheduleRedraw();
}
function openPanel(node) {
  const conns = edges.filter(e => {
    if (e.source !== node && e.target !== node) return false;
    // In search mode, only show connections to other hit nodes
    if (searchActive) {
      const other = e.source === node ? e.target : e.source;
      return !!searchHits[other.id];
    }
    return true;
  }).map(e => ({ node: e.source === node ? e.target : e.source, weight: e.weight }))
    .sort((a, b) => b.weight - a.weight);
  document.getElementById('panel-category').textContent = categoryLabels[node.category] || '';
  document.getElementById('panel-category').style.color = node.hex;
  document.getElementById('panel-name').textContent = formatLabel(node.id);
  document.getElementById('panel-facts').textContent = node.facts.toLocaleString();
  document.getElementById('panel-sessions').textContent = node.sessions;
  document.getElementById('panel-conns').textContent = conns.length;
  const el = document.getElementById('panel-connections');
  el.innerHTML = conns.map(c => `<div class="conn-item" data-id="${c.node.id}"><div class="conn-dot" style="background:${c.node.hex}"></div><div class="conn-name">${formatLabel(c.node.id)}</div><div class="conn-sessions">${c.weight} sessions</div></div>`).join('');
  el.querySelectorAll('.conn-item').forEach(item => item.addEventListener('click', () => { const t = nodeMap[item.dataset.id]; if (t) selectNode(t); }));
  panel.classList.add('open');
  viewOffsetTarget = -200; // shift graph left to make room for panel
}
function closePanel() { panel.classList.remove('open'); selected = null; flowParticles.length = 0; viewOffsetTarget = 0; scheduleRedraw(); }
document.getElementById('panel-close').addEventListener('click', closePanel);

// SEARCH
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-results-count');
const searchClear = document.getElementById('search-clear');
let searchTimeout = null;
const projectAliases = {
  'app-oignon':'client-alpha','ssp':'client-bravo','origo':'client-charlie','site-koality':'client-delta',
  'biobreizh-webapp':'client-echo','biobreizh':'client-echo','maintenance-ssp':'client-foxtrot',
  'clickanddive':'client-golf','site-plouzane':'client-hotel','les-ptits-doudous':'client-india',
  'jeofun-app':'jeofun','.pai':'pai','claude-traffic-viewer':'traffic-viewer','fabou-website':'fabou',
  'epicycle-draw-fournier':'epicycle','investissement-2':'investissement','biobreizh-r':'client-echo',
  'api-biobreizh':'client-echo','all-projects-analysis':null,
};
function mapProject(id) { return projectAliases.hasOwnProperty(id) ? projectAliases[id] : (nodeMap[id] ? id : null); }

async function doSearch(query) {
  try {
    const res = await fetch('http://localhost:18765/search?q=' + encodeURIComponent(query));
    const data = await res.json();
    searchHits = {}; let total = 0;
    data.forEach(r => { const g = mapProject(r.project); if (g) { searchHits[g] = (searchHits[g]||0) + r.hits; total += r.hits; } });
    searchActive = Object.keys(searchHits).length > 0;
    searchCount.textContent = searchActive ? total + ' faits, ' + Object.keys(searchHits).length + ' projets' : 'aucun resultat';
    searchClear.style.display = 'block';
    selected = null; closePanel();
    // Spawn flow particles between hit nodes
    flowParticles.length = 0;
    edges.forEach(e => {
      if (searchHits[e.source.id] && searchHits[e.target.id]) {
        for (let i = 0; i < Math.ceil(e.weight / 3); i++)
          flowParticles.push({ edge: e, t: Math.random(), speed: 0.002 + Math.random()*0.003, dir: 1, size: 2+Math.random()*1.5, rgb: e.source.rgb });
      }
    });
    scheduleRedraw();
  } catch { searchCount.textContent = 'serveur off'; }
}
function resetSearch(clearInput) {
  searchHits = {}; searchActive = false; searchCount.textContent = ''; searchClear.style.display = 'none';
  if (clearInput) searchInput.value = '';
  requestAnimationFrame(draw);
}
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { resetSearch(false); return; }
  searchTimeout = setTimeout(() => doSearch(q), 250);
});
searchClear.addEventListener('click', () => resetSearch(true));
searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') { resetSearch(true); searchInput.blur(); } });

// RENDER
function draw() {
  rafPending = false;
  frame++;
  // Animate view offset
  const prevOffset = viewOffsetX;
  viewOffsetX += (viewOffsetTarget - viewOffsetX) * 0.12;
  if (Math.abs(viewOffsetX - viewOffsetTarget) < 0.5) viewOffsetX = viewOffsetTarget;
  const offsetAnimating = viewOffsetX !== prevOffset;

  if (!settled) { simulate(); simSteps++; if (simSteps >= 300) settled = true; }
  if (selected || searchActive) flowParticles.forEach(p => { p.t += p.speed*p.dir; if (p.t > 1) p.t -= 1; if (p.t < 0) p.t += 1; });

  const focus = searchActive ? null : (selected || hovered);
  ctx.fillStyle = '#fbf9f5'; ctx.fillRect(0, 0, W, H);
  drawGrid();
  ctx.save();
  ctx.translate(viewOffsetX, 0);

  // Links
  edges.forEach(e => {
    const act = focus && (e.source === focus || e.target === focus);
    // In search mode: only show links between hit nodes
    if (searchActive) {
      const srcHit = searchHits[e.source.id], tgtHit = searchHits[e.target.id];
      if (!srcHit && !tgtHit) return;
      const {r,g,b} = e.source.rgb;
      const a = (srcHit && tgtHit) ? 0.25 : 0.06;
      ctx.beginPath(); ctx.moveTo(e.source.x,e.source.y); ctx.lineTo(e.target.x,e.target.y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${a})`; ctx.lineWidth = 0.8; ctx.stroke();
      return;
    }
    const {r,g,b} = e.source.rgb;
    if (focus && !act) { ctx.beginPath(); ctx.moveTo(e.source.x,e.source.y); ctx.lineTo(e.target.x,e.target.y); ctx.strokeStyle='rgba(200,198,194,0.06)'; ctx.lineWidth=0.5; ctx.stroke(); }
    else { const a = act ? 0.35 : 0.06+(e.weight/22)*0.08, w = act ? 1.5+e.weight*0.1 : 0.5+e.weight*0.08;
      ctx.beginPath(); ctx.moveTo(e.source.x,e.source.y); ctx.lineTo(e.target.x,e.target.y);
      ctx.strokeStyle = act ? `rgba(${focus.rgb.r},${focus.rgb.g},${focus.rgb.b},${a})` : `rgba(${r},${g},${b},${a})`; ctx.lineWidth=w; ctx.stroke(); }
  });

  // Flow particles
  if (selected || searchActive) flowParticles.forEach(p => {
    const {source,target} = p.edge; const x = source.x+(target.x-source.x)*p.t, y = source.y+(target.y-source.y)*p.t;
    ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2); ctx.fillStyle=`rgba(${p.rgb.r},${p.rgb.g},${p.rgb.b},0.7)`; ctx.fill();
  });

  // Nodes
  nodes.forEach(n => {
    const {r,g,b} = n.rgb, isFoc = n===focus;
    const isConn = focus && edges.some(e => (e.source===focus&&e.target===n)||(e.target===focus&&e.source===n));
    const isHit = searchActive && searchHits[n.id], dimmed = searchActive ? !isHit : (focus && !isFoc && !isConn);
    const scale = isHit ? Math.min(1.4, 1+(searchHits[n.id]/20)*0.4) : 1;
    const alpha = dimmed ? 0.08 : (isFoc||isHit ? 1 : 0.7), dr = n.radius*scale;

    if (!dimmed) { ctx.beginPath(); ctx.arc(n.x+1,n.y+2,dr+2,0,Math.PI*2); ctx.fillStyle=`rgba(${r},${g},${b},${isFoc||isHit?0.12:0.06})`; ctx.fill(); }
    ctx.beginPath(); ctx.arc(n.x,n.y,dr,0,Math.PI*2); ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`; ctx.fill();
    if (!dimmed) { ctx.strokeStyle=`rgba(${r},${g},${b},${isFoc||isHit?0.9:0.2})`; ctx.lineWidth=isFoc||isHit?2.5:1; ctx.stroke(); }

    if (isHit) {
      const t = ''+searchHits[n.id];
      ctx.font = `600 ${Math.max(11, dr*0.35)}px 'Space Grotesk',sans-serif`;
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t, n.x, n.y);
    }
    if (n===selected) { const p=0.5+Math.sin(frame*0.05)*0.3; ctx.beginPath(); ctx.arc(n.x,n.y,n.radius+6,0,Math.PI*2); ctx.strokeStyle=`rgba(${r},${g},${b},${p*0.3})`; ctx.lineWidth=2; ctx.stroke(); }

    if ((n.facts>80||isFoc||isConn||isHit) && !dimmed) {
      const label = formatLabel(n.id), fs = n.radius>18?11:9;
      ctx.font=`500 ${fs}px 'Space Grotesk',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
      const ly = n.y+dr+5; ctx.fillStyle=(isFoc||isHit)?'#1b1c1a':`rgba(27,28,26,${n.facts>200?0.65:0.35})`; ctx.fillText(label,n.x,ly);
      if (isFoc||n.facts>400) { ctx.font=`400 ${fs-1}px 'Manrope',sans-serif`; ctx.fillStyle='rgba(27,28,26,0.25)'; ctx.fillText(''+n.facts,n.x,ly+fs+2); }
    }
  });

  ctx.restore();
  if (!settled || selected || offsetAnimating || (searchActive && flowParticles.length)) { scheduleRedraw(); }
}

function formatLabel(id) {
  const n = { 'pai':'PAI','gittte':'GITTTTE','koality-pm':'Koality PM','map-creator':'Map Creator','voice-notes':'Voice Notes',
    'traffic-viewer':'Traffic Viewer','claude-analysis':'Claude Analysis','cours-isen':'Cours ISEN','battle-ia':'Battle IA','jeofun':'JeoFun',
    'client-alpha':'Client Alpha','client-bravo':'Client Bravo','client-charlie':'Client Charlie','client-delta':'Client Delta',
    'client-echo':'Client Echo','client-foxtrot':'Client Foxtrot','client-golf':'Client Golf','client-hotel':'Client Hotel','client-india':'Client India' };
  return n[id] || id.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

draw();
</script>
