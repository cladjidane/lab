<!DOCTYPE html>
<html>
<head><title>Test Input</title></head>
<body style="background:#fbf9f5; font-family:sans-serif; padding:40px;">
  <h2>Test 1 - input simple</h2>
  <input type="text" placeholder="Tape ici..." style="padding:10px; font-size:16px; width:300px;">

  <h2 style="margin-top:40px;">Test 2 - input avec canvas fixed derriere</h2>
  <canvas id="c" style="position:fixed; top:0; left:0; z-index:1; pointer-events:none;" width="100" height="100"></canvas>
  <div style="position:fixed; top:120px; left:40px; z-index:100; pointer-events:auto;">
    <input id="test2" type="text" placeholder="Tape ici avec canvas..." style="padding:10px; font-size:16px; width:300px; pointer-events:auto; -webkit-user-select:text; user-select:text; z-index:200; position:relative;">
  </div>
</body>
</html>
